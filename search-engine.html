<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Vexaura Search</title>
  <style>
    :root {
      color-scheme: dark;
      --ink: #f5f7fa;
      --muted: #a9b1bc;
      --line: #303741;
      --paper: #080a0d;
      --panel: #12161c;
      --accent: #d8dde5;
      --accent-strong: #ffffff;
      --gold: #c7a35a;
      --rose: #cf6679;
      --shadow: 0 18px 54px rgba(0, 0, 0, .42);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 50% 0%, rgba(216, 221, 229, .16), transparent 360px),
        linear-gradient(180deg, #15191f 0%, var(--paper) 430px),
        var(--paper);
      color: var(--ink);
    }

    button,
    input,
    select {
      font: inherit;
    }

    .shell {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 42px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 58px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 11px;
      font-weight: 800;
      font-size: 1.05rem;
    }

    .brand-mark {
      width: 38px;
      height: 38px;
      border-radius: 9px;
      overflow: hidden;
      background: #414446;
      box-shadow: 0 8px 24px rgba(21, 32, 43, .22);
    }

    .brand-mark img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
    }

    .quick-links {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .quick-links a {
      color: var(--muted);
      text-decoration: none;
      border: 1px solid var(--line);
      background: rgba(18, 22, 28, .78);
      padding: 8px 12px;
      border-radius: 8px;
      font-size: .9rem;
    }

    main {
      display: grid;
      gap: 28px;
    }

    .search-area {
      display: grid;
      place-items: center;
      text-align: center;
      min-height: 230px;
    }

    h1 {
      margin: 0 0 18px;
      font-size: clamp(2.6rem, 7vw, 5.4rem);
      line-height: .92;
      letter-spacing: 0;
    }

    .tagline {
      color: var(--muted);
      margin: 0 0 30px;
      max-width: 620px;
      line-height: 1.6;
      font-size: 1.05rem;
    }

    .search-box {
      width: min(760px, 100%);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: 10px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
    }

    .input-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
      padding: 0 10px;
    }

    .input-wrap svg {
      flex: 0 0 auto;
      color: var(--accent);
    }

    #query {
      width: 100%;
      border: 0;
      outline: 0;
      min-height: 48px;
      color: var(--ink);
      background: transparent;
      font-size: 1.05rem;
    }

    #searchBtn {
      border: 0;
      background: #e8ecf2;
      color: #101419;
      border-radius: 7px;
      padding: 0 18px;
      min-height: 48px;
      cursor: pointer;
      font-weight: 750;
    }

    #searchBtn:hover,
    #searchBtn:focus-visible {
      background: var(--accent-strong);
    }

    .tools {
      width: min(760px, 100%);
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      margin-top: 14px;
    }

    .tools button,
    .tools select {
      border: 1px solid var(--line);
      background: rgba(18, 22, 28, .88);
      color: var(--ink);
      border-radius: 8px;
      padding: 9px 11px;
      min-height: 40px;
    }

    .tools button {
      cursor: pointer;
    }

    .content-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 310px;
      gap: 22px;
      align-items: start;
    }

    .results-panel,
    .side-panel {
      background: rgba(18, 22, 28, .78);
      border: 1px solid var(--line);
      border-radius: 8px;
    }

    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
    }

    .panel-head h2 {
      margin: 0;
      font-size: 1rem;
    }

    .count {
      color: var(--muted);
      font-size: .9rem;
    }

    #results {
      display: grid;
      gap: 0;
    }

    .result {
      padding: 18px;
      border-bottom: 1px solid var(--line);
    }

    .result:last-child {
      border-bottom: 0;
    }

    .result a {
      display: inline-block;
      color: #f5f7fa;
      font-size: 1.1rem;
      font-weight: 760;
      text-decoration: none;
      margin-bottom: 6px;
    }

    .result a:hover {
      text-decoration: underline;
    }

    .result.web-wide {
      background: linear-gradient(90deg, rgba(216, 221, 229, .12), transparent);
    }

    .result.web-wide a {
      color: #ffffff;
    }

    .url {
      color: #b8c0cc;
      font-size: .88rem;
      word-break: break-word;
      margin-bottom: 8px;
    }

    .snippet {
      color: #cbd3df;
      line-height: 1.55;
      margin: 0;
    }

    mark {
      background: rgba(199, 163, 90, .34);
      color: inherit;
      padding: 0 .1em;
      border-radius: 3px;
    }

    .side-panel {
      padding: 16px;
      display: grid;
      gap: 18px;
    }

    .side-panel h3 {
      margin: 0 0 10px;
      font-size: .92rem;
      color: #d8dde5;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip {
      border: 1px solid var(--line);
      background: #181d24;
      color: var(--ink);
      border-radius: 999px;
      padding: 7px 10px;
      cursor: pointer;
      max-width: 100%;
    }

    .empty {
      padding: 34px 18px;
      color: var(--muted);
      line-height: 1.55;
      text-align: center;
    }

    .engine-actions {
      display: grid;
      gap: 8px;
    }

    .engine-actions a {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      text-decoration: none;
      color: var(--ink);
      background: #181d24;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 11px 12px;
      min-height: 44px;
    }

    .engine-actions span {
      color: var(--muted);
    }

    @media (max-width: 820px) {
      header {
        align-items: flex-start;
        flex-direction: column;
        margin-bottom: 34px;
      }

      .quick-links {
        justify-content: flex-start;
      }

      .search-box {
        grid-template-columns: 1fr;
      }

      #searchBtn {
        width: 100%;
      }

      .content-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 480px) {
      .shell {
        width: min(100% - 20px, 1120px);
      }

      .tools {
        justify-content: stretch;
      }

      .tools button,
      .tools select {
        flex: 1 1 135px;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header>
      <div class="brand" aria-label="Vexaura Search">
        <div class="brand-mark" aria-hidden="true">
          <img src="vexaura-logo.png" alt="">
        </div>
        Vexaura
      </div>
      <nav class="quick-links" aria-label="Useful links">
        <a href="https://www.wikipedia.org/" target="_blank" rel="noreferrer">Wikipedia</a>
        <a href="https://archive.org/" target="_blank" rel="noreferrer">Archive</a>
        <a href="https://news.ycombinator.com/" target="_blank" rel="noreferrer">Tech News</a>
      </nav>
    </header>

    <main>
      <section class="search-area" aria-labelledby="pageTitle">
        <h1 id="pageTitle">Vexaura</h1>
        <p class="tagline">A clean little search engine for fast local results, recent searches, and one-click web searches when you want the whole internet.</p>

        <form class="search-box" id="searchForm">
          <label class="input-wrap" for="query">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M10.7 17.4a6.7 6.7 0 1 1 0-13.4 6.7 6.7 0 0 1 0 13.4Z" stroke="currentColor" stroke-width="2.1"/>
              <path d="m15.8 15.8 4.2 4.2" stroke="currentColor" stroke-width="2.1" stroke-linecap="round"/>
            </svg>
            <input id="query" name="q" type="search" autocomplete="off" placeholder="Search ideas, tools, docs, and the web">
          </label>
          <button id="searchBtn" type="submit">Search Web</button>
        </form>

        <div class="tools" aria-label="Search tools">
          <select id="category">
            <option value="all">All categories</option>
            <option value="knowledge">Knowledge</option>
            <option value="tools">Tools</option>
            <option value="news">News</option>
            <option value="learning">Learning</option>
            <option value="social">Social</option>
            <option value="entertainment">Entertainment</option>
            <option value="shopping">Shopping</option>
            <option value="favourites">Favourites</option>
          </select>
          <select id="sort">
            <option value="relevance">Most relevant</option>
            <option value="fresh">Newest first</option>
            <option value="title">Title A-Z</option>
          </select>
          <button id="luckyBtn" type="button">I'm Feeling Lucky</button>
        </div>
      </section>

      <section class="content-grid">
        <div class="results-panel">
          <div class="panel-head">
            <h2>Results</h2>
            <span class="count" id="resultCount">Start typing to search</span>
          </div>
          <div id="results" aria-live="polite"></div>
        </div>

        <aside class="side-panel" aria-label="Search extras">
          <section>
            <h3>Try These</h3>
            <div class="chips" id="suggestions"></div>
          </section>
          <section>
            <h3>Recent Searches</h3>
            <div class="chips" id="recent"></div>
          </section>
          <section>
            <h3>Search The Web</h3>
            <div class="engine-actions" id="externalLinks"></div>
          </section>
        </aside>
      </section>
    </main>
  </div>

    const categorySelect = document.querySelector("#category");
    const sortSelect = document.querySelector("#sort");
    const resultsEl = document.querySelector("#results");
    const resultCountEl = document.querySelector("#resultCount");
    const suggestionsEl = document.querySelector("#suggestions");
    const recentEl = document.querySelector("#recent");
    const externalLinksEl = document.querySelector("#externalLinks");
    const luckyBtn = document.querySelector("#luckyBtn");

    const suggestions = ["youtube", "facebook", "instagram", "amazon", "github", "netflix.com"];
    const engines = [
      ["Google", "https://www.google.com/search?q="],
      ["Bing", "https://www.bing.com/search?q="],
      ["DuckDuckGo", "https://duckduckgo.com/?q="]
    ];

    function normalize(value) {
      return value.trim().toLowerCase();
    }

    function favoriteTitle(url) {
      const knownTitles = new Map([
        ["web.whatsapp.com", "WhatsApp Web"],
        ["studywithme.io", "Study With Me Pomodoro"],
        ["www.hotstar.com", "JioHotstar"],
        ["mail.google.com", "Gmail"],
        ["www.flipkart.com", "Flipkart"],
        ["chatgpt.com", "ChatGPT"],
        ["aternos.org", "Aternos Servers"],
        ["www.amazon.in", "Amazon India"],
        ["www.youtube.com", "YouTube"],
        ["hianime.org", "HiAnime"],
        ["www.primevideo.com", "Prime Video"],
        ["x.com", "X"],
        ["steamunlocked.org", "SteamUnlocked"],
        ["in.pinterest.com", "Pinterest"],
        ["flipclock.app", "Flip Clock Timer"],
        ["www.pw.live", "Physics Wallah"],
        ["www.google.com", "Google Maps"],
        ["se7en.ws", "Se7en Games"],
        ["notebooklm.google.com", "NotebookLM"],
        ["www.perplexity.ai", "Perplexity"],
        ["nios.ac.in", "NIOS Course Material"],
        ["sdmis.nios.ac.in", "NIOS Student Portal"],
        ["www.voidanime.tech", "Void Anime"],
        ["swayam.gov.in", "SWAYAM"],
        ["www.wattpad.com", "Wattpad"],
        ["seraphinawinters.stck.me", "Seraphina Winters"],
        ["www.inkitt.com", "Inkitt"],
        ["outlook.live.com", "Outlook Mail"],
        ["voidtv.org", "Void TV"],
        ["app.athenify.io", "Athenify"],
        ["www.studytracker.space", "Study Tracker"],
        ["nswpedia.com", "NSW Pedia"],
        ["ankergames.net", "Anker Games"],
        ["store.epicgames.com", "Epic Games Store"],
        ["studio.youtube.com", "YouTube Studio"],
        ["moviesutra.com", "MovieSutra"],
        ["github.com", "GitHub Profile"]
      ]);
      const parsed = new URL(url);
      if (knownTitles.has(parsed.hostname)) return knownTitles.get(parsed.hostname);
      return parsed.hostname
        .replace(/^www\./, "")
        .split(".")[0]
        .replace(/[-_]/g, " ")
        .replace(/\b\w/g, letter => letter.toUpperCase());
    }

    function scoreItem(item, terms) {
      const title = item.title.toLowerCase();
      const snippet = item.snippet.toLowerCase();
      const keywords = item.keywords.join(" ").toLowerCase();
      return terms.reduce((score, term) => {
        if (title.includes(term)) score += 8;
        if (keywords.includes(term)) score += 5;
        if (snippet.includes(term)) score += 3;
        if (item.category.includes(term)) score += 2;
        return score;
      }, 0);
    }

    function directWebsiteResult(query) {
      const cleaned = query.replace(/^https?:\/\//, "").replace(/^www\./, "").split(/[/?#]/)[0];
      const isDomain = /^[a-z0-9-]+(\.[a-z0-9-]+)+$/i.test(cleaned);
      if (!isDomain) return null;
      return {
        title: `Open ${cleaned}`,
        url: `https://${cleaned}`,
        category: "tools",
        date: "2026-06-01",
        snippet: "Direct website match. Vexaura can open any full domain you type, even when it is not saved in the local directory.",
        keywords: [cleaned, "website", "domain"],
        score: 99
      };
    }

    function worldWideWebResult(query) {
      if (!query) return null;
      return {
        title: `Search the whole web for "${query}"`,
        url: `https://www.google.com/search?q=${encodeURIComponent(query)}`,
        category: "tools",
        date: "2026-06-01",
        snippet: "Global web search. Use this for websites and pages from around the world, beyond the saved Vexaura shortcuts.",
        keywords: [query, "global", "web", "internet"],
        score: 100,
        isWebWide: true
      };
    }

    function highlight(text, terms) {
      if (!terms.length) return text;
      const escaped = terms.map(term => term.replace(/[.*+?^${}()|[\]\\]/g, "\\$&")).join("|");
      return text.replace(new RegExp(`(${escaped})`, "gi"), "<mark>$1</mark>");
    }

    function search() {
      const query = normalize(queryInput.value);
      const category = categorySelect.value;
      const terms = query.split(/\s+/).filter(Boolean);
      let results = index
        .map(item => ({ ...item, score: terms.length ? scoreItem(item, terms) : 1 }))
        .filter(item => category === "all" || item.category === category)
        .filter(item => !terms.length || item.score > 0);
      const globalResult = worldWideWebResult(query);
      if (globalResult && category === "all") {
        results = [globalResult, ...results];
      }
      const directResult = directWebsiteResult(query);
      if (directResult && (category === "all" || category === directResult.category)) {
        results = [directResult, ...results.filter(item => item.url !== directResult.url)];
      }

      if (sortSelect.value === "fresh") {
        results.sort((a, b) => b.date.localeCompare(a.date));
      } else if (sortSelect.value === "title") {
        results.sort((a, b) => a.title.localeCompare(b.title));
      } else {
        results.sort((a, b) => b.score - a.score || b.date.localeCompare(a.date));
      }

      renderResults(results, terms, query);
      renderExternalLinks(query);
      if (query) saveRecent(query);
    }

    function renderResults(results, terms, query) {
      if (!results.length) {
        resultCountEl.textContent = query ? "No local matches" : "Start typing to search";
        resultsEl.innerHTML = `<div class="empty">No saved shortcut matches yet. Switch to All categories or use the web search links to search websites around the world.</div>`;
        return;
      }

      resultCountEl.textContent = `${results.length} local result${results.length === 1 ? "" : "s"}`;
      resultsEl.innerHTML = results.map(item => `
        <article class="result${item.isWebWide ? " web-wide" : ""}">
          <a href="${item.url}" target="_blank" rel="noreferrer">${highlight(item.title, terms)}</a>
          <div class="url">${item.url}</div>
          <p class="snippet">${highlight(item.snippet, terms)}</p>
        </article>
      `).join("");
    }

    function renderSuggestions() {
      suggestionsEl.innerHTML = suggestions.map(text => `<button class="chip" type="button">${text}</button>`).join("");
      suggestionsEl.querySelectorAll("button").forEach(button => {
        button.addEventListener("click", () => {
          queryInput.value = button.textContent;
          search();
        });
      });
    }

    function getRecent() {
      try {
        return JSON.parse(localStorage.getItem("vexauraRecent") || "[]");
      } catch {
        return [];
      }
    }

    function saveRecent(query) {
      const recent = [query, ...getRecent().filter(item => item !== query)].slice(0, 6);
      localStorage.setItem("vexauraRecent", JSON.stringify(recent));
      renderRecent();
    }

    function renderRecent() {
      const recent = getRecent();
      recentEl.innerHTML = recent.length
        ? recent.map(text => `<button class="chip" type="button">${text}</button>`).join("")
        : `<span class="count">Your searches will show here.</span>`;
      recentEl.querySelectorAll("button").forEach(button => {
        button.addEventListener("click", () => {
          queryInput.value = button.textContent;
          search();
        });
      });
    }

    function renderExternalLinks(query = "") {
      const encoded = encodeURIComponent(query || "search engine");
      externalLinksEl.innerHTML = engines.map(([name, base]) => `
        <a href="${base}${encoded}" target="_blank" rel="noreferrer">
          ${name}
          <span>Open</span>
        </a>
      `).join("");
    }

    form.addEventListener("submit", event => {
      event.preventDefault();
      search();
    });

    queryInput.addEventListener("input", search);
    categorySelect.addEventListener("change", search);
    sortSelect.addEventListener("change", search);
    luckyBtn.addEventListener("click", () => {
      const first = [...resultsEl.querySelectorAll(".result a")][0];
      if (first) first.click();
    });

    renderSuggestions();
    renderRecent();
    renderExternalLinks();
    renderResults(index, [], "");
  </script>
</body>
</html>
